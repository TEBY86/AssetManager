<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeEditor Ultra Pro</title>
    
    <!-- Fuentes e Iconos -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- CodeMirror 5 (Editor Core y Tema) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/material-ocean.min.css">
    
    <!-- Addon CSS para el Buscador (Dialog) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/dialog/dialog.min.css">
    
    <style>
        :root {
            /* Paleta Premium Dark */
            --bg-base: #0f111a;
            --bg-glass: rgba(25, 28, 41, 0.7);
            --bg-glass-hover: rgba(35, 38, 55, 0.8);
            --bg-panel: #141722;
            --border-glass: rgba(255, 255, 255, 0.05);
            --border-hover: rgba(255, 255, 255, 0.15);
            --text-main: #e2e8f0;
            --text-muted: #8b949e;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.4);
            --accent-hover: #818cf8;
            --success: #10b981;
            --danger: #ef4444;
            --python-bg: #1e1e1e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1a1c29, var(--bg-base) 60%);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        .header {
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-glass);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo div {
            background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .lang-select {
            background: rgba(0, 0, 0, 0.2);
            color: var(--text-main);
            border: 1px solid var(--border-glass);
            padding: 8px 16px;
            border-radius: 8px;
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            outline: none;
            transition: all 0.3s ease;
            appearance: none;
            -webkit-appearance: none;
        }
        .lang-select:hover { border-color: var(--accent); }
        .lang-select option { background: var(--bg-panel); }

        .btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-run {
            background: var(--accent);
            color: white;
            box-shadow: 0 0 15px var(--accent-glow);
        }
        .btn-run:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.6);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            border: 1px solid var(--border-glass);
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            border-color: var(--border-hover);
        }
        
        .btn-icon {
            padding: 8px;
            border-radius: 8px;
        }

        /* MAIN LAYOUT */
        .workspace {
            display: flex;
            flex: 1;
            height: calc(100vh - 60px);
            position: relative;
        }

        .panel {
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        #editorPanel {
            flex: 0 0 50%; /* Default 50% width */
            min-width: 20%;
        }
        
        #previewPanel {
            flex: 1; /* Takes the remaining space */
            min-width: 20%;
        }

        /* BARRA REDIMENSIONABLE */
        .resizer {
            width: 4px;
            background: var(--border-glass);
            cursor: col-resize;
            z-index: 20;
            transition: background 0.2s, width 0.2s;
        }
        .resizer:hover, .resizer.active {
            background: var(--accent);
            width: 6px;
        }

        .panel-header {
            background: rgba(0,0,0,0.15);
            padding: 8px 16px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-glass);
        }

        .toolbar-group {
            display: flex;
            gap: 6px;
        }

        /* EDITOR (CodeMirror Override) */
        .editor-container {
            flex: 1;
            overflow: hidden;
            position: relative;
        }
        
        .CodeMirror {
            height: 100% !important;
            font-family: 'Fira Code', monospace !important;
            font-size: 14px;
            letter-spacing: 0.3px;
            line-height: 1.6;
        }
        .CodeMirror-gutters {
            border-right: 1px solid var(--border-glass) !important;
            background: var(--bg-panel) !important;
        }

        /* PREVIEW */
        .preview-container {
            flex: 1;
            background: #ffffff;
            position: relative;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #ffffff;
            /* Prevents iframe from intercepting mouse dragging */
            pointer-events: auto; 
        }

        /* PYTHON TERMINAL */
        .python-terminal {
            display: none;
            flex: 1;
            background: var(--python-bg);
            color: #a6accd;
            font-family: 'Fira Code', monospace;
            padding: 20px;
            overflow-y: auto;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 5;
        }
        .python-terminal.active { display: block; }
        .term-header {
            color: var(--success);
            margin-bottom: 15px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
        .term-output {
            white-space: pre-wrap;
            line-height: 1.5;
        }

        /* STATUS BAR & LOADER */
        .status-bar {
            background: var(--bg-base);
            border-top: 1px solid var(--border-glass);
            padding: 4px 20px;
            font-size: 11px;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
        }
        
        .loader {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            display: none;
        }
        .loading .loader { display: inline-block; }
        .loading i { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(15, 17, 26, 0.9);
            backdrop-filter: blur(10px);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            border-left: 4px solid var(--accent);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transform: translateX(150%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }
        .toast.show { transform: translateX(0); }

        /* SCROLLBARS */
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg-base); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        /* ESTILOS DEL BUSCADOR (DIALOG CODEMIRROR) PRO */
        .CodeMirror-dialog {
            background: var(--bg-panel);
            color: var(--text-main);
            border-bottom: 1px solid var(--border-glass) !important;
            padding: 10px 15px !important;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }
        .CodeMirror-dialog input {
            background: var(--bg-base);
            border: 1px solid var(--border-glass);
            color: white;
            padding: 5px 10px;
            border-radius: 6px;
            font-family: 'Fira Code', monospace;
            outline: none;
            transition: border-color 0.3s;
        }
        .CodeMirror-dialog input:focus { border-color: var(--accent); }
        .CodeMirror-dialog button {
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            color: var(--text-main);
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            margin-left: 8px;
            transition: all 0.2s;
            font-weight: 500;
        }
        .CodeMirror-dialog button:hover { 
            background: var(--accent); 
            border-color: var(--accent); 
            color: white;
        }

        @media(max-width: 768px) {
            .workspace { flex-direction: column; }
            .header { flex-direction: column; gap: 15px; }
            .controls { width: 100%; justify-content: center; flex-wrap: wrap; }
            #editorPanel, #previewPanel { flex: 1 !important; width: 100%; }
            .resizer { height: 4px; width: 100%; cursor: row-resize; }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">
            <i class="fas fa-code" style="color: var(--accent);"></i>
            <div>CodeEditor Pro</div>
        </div>
        <div class="controls">
            <select id="langSelect" class="lang-select">
                <option value="html">🌐 HTML / CSS / JS</option>
                <option value="react">⚛️ React (JSX)</option>
                <option value="python">🐍 Python (Pyodide)</option>
            </select>
            
            <button class="btn btn-secondary" onclick="resetEditor()" title="Cargar Plantilla">
                <i class="fas fa-undo"></i>
            </button>
            <button class="btn btn-run" id="runBtn" onclick="runCode()" title="Ctrl + Enter">
                <div class="loader"></div>
                <i class="fas fa-play"></i> Ejecutar
            </button>
        </div>
    </header>

    <div class="workspace">
        <!-- Panel del Editor -->
        <div class="panel" id="editorPanel">
            <div class="panel-header">
                <span><i class="fas fa-keyboard"></i> Código Fuente (<span id="langIndicator">HTML</span>)</span>
                
                <!-- NUEVAS FUNCIONES DE PRODUCTIVIDAD -->
                <div class="toolbar-group">
                    <button class="btn btn-secondary btn-icon" onclick="formatCode()" title="Formatear Código">
                        <i class="fas fa-align-left"></i>
                    </button>
                    <button class="btn btn-secondary btn-icon" onclick="copyCode()" title="Copiar al Portapapeles">
                        <i class="fas fa-copy"></i>
                    </button>
                    <button class="btn btn-secondary btn-icon" onclick="downloadCode()" title="Descargar Archivo (Ctrl+S)">
                        <i class="fas fa-download"></i>
                    </button>
                </div>
            </div>
            <div class="editor-container">
                <textarea id="codeEditor"></textarea>
            </div>
        </div>

        <!-- Barra Redimensionable -->
        <div class="resizer" id="resizer"></div>

        <!-- Panel de Resultados -->
        <div class="panel" id="previewPanel">
            <div class="panel-header">
                <span><i class="fas fa-eye"></i> Resultado / Salida</span>
                <button class="btn btn-secondary btn-icon" onclick="document.getElementById('previewFrame').src='about:blank'; setTimeout(runCode, 50)" title="Recargar Vista Previa">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>
            <div class="preview-container">
                <!-- HTML/React Output -->
                <iframe id="previewFrame" sandbox="allow-scripts allow-modals allow-same-origin"></iframe>
                
                <!-- Python Real Output -->
                <div id="pythonTerminal" class="python-terminal">
                    <div class="term-header">🐍 Consola Python (Pyodide WebAssembly)</div>
                    <div id="termOutput" class="term-output">Esperando ejecución...</div>
                </div>
            </div>
        </div>
    </div>

    <div class="status-bar">
        <span id="statusMsg"><i class="fas fa-check-circle" style="color: var(--success);"></i> Listo. Usa Ctrl+F para buscar y Ctrl+S para guardar.</span>
        <span id="posIndicator">Línea 1, Col 1</span>
    </div>

    <div id="toast" class="toast">Notificación</div>

    <!-- Scripts Core de CodeMirror -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/jsx/jsx.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>
    <!-- Addons CodeMirror: Comentar y Cerrar llaves -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/edit/closebrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/edit/matchbrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/comment/comment.min.js"></script>
    
    <!-- Addons CodeMirror: Buscador Avanzado (Ctrl+F) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/dialog/dialog.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/search/searchcursor.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/search/search.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/search/jump-to-line.min.js"></script>
    
    <!-- Script de Pyodide para Python -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>

    <script>
        // Variables Globales
        let editor;
        let pyodideInstance = null;
        const langSelect = document.getElementById('langSelect');
        const pythonTerminal = document.getElementById('pythonTerminal');
        const termOutput = document.getElementById('termOutput');
        const previewFrame = document.getElementById('previewFrame');
        const runBtn = document.getElementById('runBtn');
        const posIndicator = document.getElementById('posIndicator');

        // Plantillas Profesionales
        const templates = {
            html: `<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Animación Web</title>
    <style>
        body { 
            margin: 0; height: 100vh; display: flex; 
            justify-content: center; align-items: center; 
            background: #0f172a; color: white; font-family: sans-serif;
        }
        .box {
            width: 100px; height: 100px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.5);
            cursor: pointer;
            transition: transform 0.3s;
        }
        .box:hover { transform: scale(1.1) rotate(5deg); }
    </style>
</head>
<body>
    <div style="text-align: center;">
        <h2 style="margin-bottom: 30px;">Haz clic en la caja</h2>
        <div class="box" id="caja"></div>
    </div>

    <script>
        // Tip: Selecciona código y presiona Ctrl+/ para comentar
        let grados = 0;
        document.getElementById('caja').addEventListener('click', function() {
            grados += 90;
            this.style.transform = \`scale(1.1) rotate(\${grados}deg)\`;
        });
    <\/script>
</body>
</html>`,

            react: `// Editor Pro: Transpilación JSX en tiempo real
import React, { useState } from 'react';
import { createRoot } from 'react-dom/client';

function App() {
    const [count, setCount] = useState(0);

    return (
        <div style={{
            fontFamily: 'system-ui', maxWidth: '400px', margin: '40px auto',
            padding: '30px', background: 'white', borderRadius: '16px',
            boxShadow: '0 10px 25px rgba(0,0,0,0.1)', textAlign: 'center'
        }}>
            <h1 style={{ color: '#6366f1' }}>React Funciona</h1>
            <p style={{ fontSize: '20px', color: '#333' }}>Contador: {count}</p>
            
            <button 
                onClick={() => setCount(count + 1)}
                style={{ 
                    background: '#6366f1', color: 'white', border: 'none', 
                    padding: '12px 24px', borderRadius: '8px', cursor: 'pointer',
                    fontSize: '16px', fontWeight: 'bold', marginTop: '10px'
                }}>
                Aumentar
            </button>
            <p style={{marginTop: '20px', fontSize: '12px', color: '#888'}}>
                Presiona Ctrl + S para descargar este archivo.
            </p>
        </div>
    );
}

const root = createRoot(document.getElementById('root'));
root.render(<App />);`,

            python: `# ¡Python ejecutándose vía WebAssembly!
import math
import sys

def calcular_area_circulo(radio):
    area = math.pi * (radio ** 2)
    return area

print("🚀 Iniciando cálculo matemático...")

radios = [5, 10, 15]

for r in radios:
    area = calcular_area_circulo(r)
    print(f"Radio: {r} -> Área: {area:.2f}")

print("\\n✅ Ejecución finalizada. (Usa Ctrl+Enter para re-ejecutar)")`
        };

        function initEditor() {
            editor = CodeMirror.fromTextArea(document.getElementById("codeEditor"), {
                mode: "htmlmixed",
                theme: "material-ocean",
                lineNumbers: true,
                autoCloseBrackets: true,
                matchBrackets: true,
                indentUnit: 4,
                tabSize: 4,
                lineWrapping: true
            });

            // Tracking the cursor position
            editor.on('cursorActivity', () => {
                const pos = editor.getCursor();
                posIndicator.textContent = `Línea ${pos.line + 1}, Col ${pos.ch + 1}`;
            });

            // Autoguardado silencioso
            editor.on('change', () => {
                localStorage.setItem('proEditorCode', editor.getValue());
                localStorage.setItem('proEditorLang', langSelect.value);
            });

            // NUEVO: Atajos de teclado avanzados
            editor.setOption("extraKeys", {
                "Ctrl-Enter": () => runCode(),
                "Cmd-Enter": () => runCode(),
                "Ctrl-S": (cm) => { downloadCode(); return false; },
                "Cmd-S": (cm) => { downloadCode(); return false; },
                "Ctrl-/": "toggleComment",
                "Cmd-/": "toggleComment"
            });

            // Cargar estado guardado
            const savedCode = localStorage.getItem('proEditorCode');
            const savedLang = localStorage.getItem('proEditorLang');
            
            if (savedLang) langSelect.value = savedLang;
            updateMode();
            
            if (savedCode) {
                editor.setValue(savedCode);
            } else {
                editor.setValue(templates[langSelect.value]);
            }

            runCode();
            setupResizer();
        }

        
        // 1. Mostrar Notificaciones
        let toastTimeout;
        function showToast(msg, type='success') {
            const toast = document.getElementById('toast');
            toast.innerHTML = type === 'success' ? `<i class="fas fa-check-circle"></i> ${msg}` : `<i class="fas fa-exclamation-circle" style="color:var(--danger)"></i> ${msg}`;
            toast.style.borderLeftColor = type === 'success' ? 'var(--success)' : 'var(--danger)';
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // 2. Formatear Código
        function formatCode() {
            const totalLines = editor.lineCount();
            editor.operation(() => {
                for (let i = 0; i < totalLines; i++) {
                    editor.indentLine(i, "smart");
                }
            });
            showToast("Código formateado automáticamente");
        }

        // 3. Copiar al portapapeles
        function copyCode() {
            const textarea = document.createElement('textarea');
            textarea.value = editor.getValue();
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            showToast("Código copiado al portapapeles");
        }

        // 4. Descargar archivo local
        function downloadCode() {
            const code = editor.getValue();
            let ext = "html";
            if (langSelect.value === 'react') ext = "jsx";
            if (langSelect.value === 'python') ext = "py";
            
            const blob = new Blob([code], {type: "text/plain;charset=utf-8"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `mi_proyecto.${ext}`;
            a.click();
            URL.revokeObjectURL(url);
            showToast(`Archivo descargado: mi_proyecto.${ext}`);
        }

        // 5. Lógica del Panel Redimensionable
        function setupResizer() {
            const resizer = document.getElementById('resizer');
            const editorPanel = document.getElementById('editorPanel');
            const iframe = document.getElementById('previewFrame');
            let isDragging = false;

            resizer.addEventListener('mousedown', function(e) {
                isDragging = true;
                resizer.classList.add('active');
                iframe.style.pointerEvents = 'none'; // Evitar que el iframe capture el mouse
            });

            window.addEventListener('mousemove', function(e) {
                if (!isDragging) return;
                
                // Si estamos en móvil, la barra es horizontal
                if (window.innerWidth <= 768) return; 

                const containerOffset = document.querySelector('.workspace').offsetLeft;
                const pointerRelativeXpos = e.clientX - containerOffset;
                const containerWidth = document.querySelector('.workspace').offsetWidth;
                const newWidthPercentage = (pointerRelativeXpos / containerWidth) * 100;
                
                // Limitar el arrastre entre el 20% y el 80% de la pantalla
                if(newWidthPercentage > 20 && newWidthPercentage < 80) {
                    editorPanel.style.flex = `0 0 ${newWidthPercentage}%`;
                }
            });

            window.addEventListener('mouseup', function(e) {
                if (isDragging) {
                    isDragging = false;
                    resizer.classList.remove('active');
                    iframe.style.pointerEvents = 'auto'; // Restaurar eventos del iframe
                }
            });
        }

        // Cambiar Modo
        function updateMode() {
            const lang = langSelect.value;
            let cmMode = "htmlmixed";
            
            if (lang === 'react') cmMode = "jsx";
            if (lang === 'python') cmMode = "python";
            
            editor.setOption("mode", cmMode);
            document.getElementById('langIndicator').textContent = langSelect.options[langSelect.selectedIndex].text.split(' ')[1];
            
            if (lang === 'python') {
                pythonTerminal.classList.add('active');
                previewFrame.style.display = 'none';
            } else {
                pythonTerminal.classList.remove('active');
                previewFrame.style.display = 'block';
            }
        }

        function resetEditor() {
            if(confirm("¿Borrar tu código y cargar la plantilla inicial?")) {
                editor.setValue(templates[langSelect.value]);
                runCode();
                showToast("Editor restaurado");
            }
        }

        langSelect.addEventListener('change', () => {
            updateMode();
            editor.setValue(templates[langSelect.value]);
            runCode();
        });

        // Motor Pyodide Asíncrono
        async function runPythonCode(code) {
            runBtn.classList.add('loading');
            termOutput.textContent = "Cargando motor Pyodide... (Esto puede tardar un momento la primera vez)";
            
            try {
                if (!pyodideInstance) {
                    pyodideInstance = await loadPyodide();
                }
                
                termOutput.textContent = "Ejecutando script...\n";
                
                // Redirigir el 'print'
                pyodideInstance.runPython(`
                    import sys
                    import io
                    sys.stdout = io.StringIO()
                    sys.stderr = io.StringIO()
                `);

                pyodideInstance.runPython(code);
                
                const stdout = pyodideInstance.runPython("sys.stdout.getvalue()");
                const stderr = pyodideInstance.runPython("sys.stderr.getvalue()");
                
                termOutput.textContent = stdout;
                if(stderr) termOutput.textContent += "\nError:\n" + stderr;
                
                showToast("Python ejecutado con éxito");

            } catch (err) {
                termOutput.textContent = `Error:\n${err}`;
                showToast("Error en código Python", "error");
            } finally {
                runBtn.classList.remove('loading');
            }
        }

        // Motor Principal de Ejecución
        function runCode() {
            const code = editor.getValue();
            const lang = langSelect.value;

            if (lang === 'python') {
                runPythonCode(code);
                return;
            }

            const doc = previewFrame.contentDocument || previewFrame.contentWindow.document;
            doc.open();

            if (lang === 'react') {
                const reactHTML = `
                <!DOCTYPE html>
                <html>
                <head>
                    <meta charset="UTF-8">
                    <script src="https://unpkg.com/react@18/umd/react.production.min.js"><\/script>
                    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"><\/script>
                    <script src="https://unpkg.com/@babel/standalone/babel.min.js"><\/script>
                    <style>body { margin: 0; background: #e2e8f0; min-height: 100vh; font-family: sans-serif; }</style>
                </head>
                <body>
                    <div id="root"></div>
                    <script type="text/babel" data-type="module">
                        ${code}
                    <\/script>
                </body>
                </html>
                `;
                doc.write(reactHTML);
            } else {
                doc.write(code);
            }
            
            doc.close();
            showToast("Código compilado y renderizado");
        }

        // Evento Global de Teclado para guardar preventivo si el editor no tiene el foco
        window.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                downloadCode();
            }
        });

        // Iniciar la aplicación
        window.onload = initEditor;

    </script>
</body>
</html>
