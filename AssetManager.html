<script>
(function() {
    'use strict';

    // ================================================================
    // CONFIGURACIÓN
    // ================================================================
    var MENU_ITEMS = [
        {
            name: "Métricas",
            icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>`,
            action: function() { showToast("📊 Métricas actualizadas"); }
        },
        {
            name: "Conexión",
            icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>`,
            action: function() { showToast("🔒 Túnel encriptado activo"); }
        },
        {
            name: "Ajustes",
            icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 008 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.54 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>`,
            action: function() { showToast("⚙️ Preferencias guardadas"); }
        }
    ];

    // ================================================================
    // TOAST
    // ================================================================
    var toastTimer = null;
    function showToast(text) {
        var toast = document.getElementById('sdk-toast');
        var textEl = document.getElementById('sdk-toast-text');
        if (!toast || !textEl) return;
        textEl.textContent = text;
        toast.classList.add('sdk-toast-show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(function() {
            toast.classList.remove('sdk-toast-show');
        }, 2500);
    }
    window.sdkNotify = showToast;

    // ================================================================
    // CONTROL PRINCIPAL (SOLO CLICK)
    // ================================================================
    var wrapper = document.getElementById('sdk-dock');
    var track = document.getElementById('sdk-track');
    var orb = document.getElementById('sdk-orb');
    if (!wrapper || !track || !orb) return;

    var isOpen = false;
    var isDragging = false;
    var startX = 0, startY = 0;
    var offsetX = 0, offsetY = 0;
    var currentX = window.innerWidth - 82;
    var currentY = window.innerHeight - 82;

    // ---- Construir menú ----
    MENU_ITEMS.forEach(function(item) {
        var btn = document.createElement('button');
        btn.className = 'sdk-pill';
        btn.innerHTML = `
            <div class="sdk-pill-icon">${item.icon}</div>
            <span class="sdk-pill-label">${item.name}</span>
        `;
        btn.addEventListener('click', function(e) {
            e.stopPropagation();
            if (!isOpen) return;
            
            if (btn.classList.contains('sdk-pill-active')) {
                item.action();
                closeDock();
                return;
            }
            
            var allPills = track.querySelectorAll('.sdk-pill');
            allPills.forEach(function(p) {
                p.classList.remove('sdk-pill-active');
                p.style.width = (window.innerWidth < 640 ? '44px' : '48px');
            });
            btn.classList.add('sdk-pill-active');
            btn.style.width = (window.innerWidth < 640 ? '190px' : '210px');
        });
        track.appendChild(btn);
    });

    // ---- Posicionamiento ----
    function getClampedPosition(x, y, openState) {
        var screenW = window.innerWidth;
        var screenH = window.innerHeight;
        var isMobile = screenW < 640;
        var orbSize = isMobile ? 52 : 58;
        var safe = isMobile ? 16 : 24;
        var maxPillW = isMobile ? 190 : 210;
        var pillH = isMobile ? 44 : 48;
        var gap = 10;
        var menuH = MENU_ITEMS.length * pillH + (MENU_ITEMS.length - 1) * gap + 14;

        var isLeft = x < (screenW / 2);
        var isTop = y < (screenH / 2);

        var minX = safe;
        var maxX = screenW - orbSize - safe;
        var minY = safe;
        var maxY = screenH - orbSize - safe;

        if (openState) {
            if (isLeft) {
                maxX = screenW - safe - maxPillW;
            } else {
                minX = safe + maxPillW - orbSize;
            }
            if (isTop) {
                maxY = screenH - safe - orbSize - menuH;
            } else {
                minY = safe + menuH;
            }
        }

        return {
            x: Math.max(minX, Math.min(maxX, x)),
            y: Math.max(minY, Math.min(maxY, y)),
            isLeft: isLeft,
            isTop: isTop
        };
    }

    function updatePosition(x, y, openState, skipLayout) {
        openState = (openState !== undefined) ? openState : isOpen;
        skipLayout = skipLayout || false;
        var pos = getClampedPosition(x, y, openState);
        currentX = pos.x;
        currentY = pos.y;

        if (!skipLayout) {
            wrapper.classList.remove('sdk-left', 'sdk-right', 'sdk-top', 'sdk-bottom');
            wrapper.classList.add(pos.isLeft ? 'sdk-left' : 'sdk-right');
            wrapper.classList.add(pos.isTop ? 'sdk-top' : 'sdk-bottom');
        }
        wrapper.style.left = pos.x + 'px';
        wrapper.style.top = pos.y + 'px';
    }

    // ---- Abrir / Cerrar ----
    function toggleDock() {
        if (isOpen) {
            closeDock();
        } else {
            openDock();
        }
    }

    function openDock() {
        if (isOpen) return;
        isOpen = true;
        wrapper.classList.add('sdk-open');
        
        var line1 = document.getElementById('sdk-line1');
        var line2 = document.getElementById('sdk-line2');
        var line3 = document.getElementById('sdk-line3');
        if (line1) line1.setAttribute('d', 'M6 18L18 6M6 6l12 12');
        if (line2) line2.setAttribute('d', '');
        if (line3) line3.setAttribute('d', '');
        
        updatePosition(currentX, currentY, true);
    }

    function closeDock() {
        if (!isOpen) return;
        isOpen = false;
        wrapper.classList.remove('sdk-open');
        
        var line1 = document.getElementById('sdk-line1');
        var line2 = document.getElementById('sdk-line2');
        var line3 = document.getElementById('sdk-line3');
        if (line1) line1.setAttribute('d', 'M4 6H20');
        if (line2) line2.setAttribute('d', 'M4 12H20');
        if (line3) line3.setAttribute('d', 'M4 18H20');
        
        var allPills = track.querySelectorAll('.sdk-pill');
        allPills.forEach(function(p) {
            p.classList.remove('sdk-pill-active');
            p.style.width = (window.innerWidth < 640 ? '44px' : '48px');
        });
        
        setTimeout(function() {
            updatePosition(currentX, currentY, false);
        }, 50);
    }

    // ---- Arrastre con mouse (y touch) ----
    function getPos(e) {
        if (e.touches && e.touches.length > 0) {
            return { x: e.touches[0].clientX, y: e.touches[0].clientY };
        }
        return { x: e.clientX, y: e.clientY };
    }

    function onStart(e) {
        if (e.target.closest('.sdk-pill')) return;
        var pos = getPos(e);
        isDragging = true;
        startX = pos.x;
        startY = pos.y;
        var rect = wrapper.getBoundingClientRect();
        offsetX = pos.x - rect.left;
        offsetY = pos.y - rect.top;
        wrapper.style.transition = 'none';
    }

    function onMove(e) {
        if (!isDragging) return;
        var pos = getPos(e);
        var dx = pos.x - startX;
        var dy = pos.y - startY;

        if (Math.hypot(dx, dy) > 5) {
            if (isOpen) closeDock();
            e.preventDefault();
            var targetX = pos.x - offsetX;
            var targetY = pos.y - offsetY;
            updatePosition(targetX, targetY, false);
        }
    }

    function onEnd(e) {
        if (!isDragging) return;
        isDragging = false;
        wrapper.style.transition = 'left 0.3s cubic-bezier(0.16, 1, 0.3, 1), top 0.3s cubic-bezier(0.16, 1, 0.3, 1)';
        updatePosition(currentX, currentY, false);
    }

    // ---- Eventos ----
    orb.addEventListener('mousedown', onStart);
    orb.addEventListener('touchstart', onStart, { passive: true });
    
    document.addEventListener('mousemove', onMove);
    document.addEventListener('touchmove', onMove, { passive: false });
    
    document.addEventListener('mouseup', onEnd);
    document.addEventListener('touchend', onEnd, { passive: true });

    // ---- CLICK para abrir/cerrar (funciona en móvil y escritorio) ----
    orb.addEventListener('click', function(e) {
        e.stopPropagation();
        if (!isDragging) {
            toggleDock();
        }
    });

    // ---- Cerrar al hacer clic fuera ----
    document.addEventListener('click', function(e) {
        if (isOpen && !wrapper.contains(e.target)) {
            closeDock();
        }
    });

    // ---- Redimensionar ----
    window.addEventListener('resize', function() {
        updatePosition(currentX, currentY, isOpen);
    });

    // ---- Posición inicial ----
    setTimeout(function() {
        var startX = window.innerWidth - (window.innerWidth < 640 ? 68 : 82);
        var startY = window.innerHeight - (window.innerWidth < 640 ? 68 : 82);
        updatePosition(startX, startY);
    }, 200);

})();
</script>
